apiVersion: v1
kind: Pod
metadata:
  name: agency-agents-mcp
  labels:
    app: agency-agents-mcp
spec:
  containers:
  - name: mcp-server
    image: bluemountain.azurecr.io/agency-agents-mcp:latest
    ports:
    - name: debug
      containerPort: 9229
      protocol: TCP
    
    # Liveness probe - restart if process is dead
    # Uses RPC healthz tool via exec command
    livenessProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - |
          echo '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"healthz","arguments":{}}}' | node server.mjs | grep -q 'status.*healthy'
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    
    # Readiness probe - don't send traffic until ready
    # Uses RPC healthz tool via exec command
    readinessProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - |
          echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"healthz","arguments":{}}}' | node server.mjs | grep -q 'status.*healthy'
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3
    
    # Startup probe - give it time to load all agents
    # Uses RPC healthz tool via exec command
    startupProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - |
          echo '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"healthz","arguments":{}}}' | node server.mjs | grep -q 'status.*healthy'
      initialDelaySeconds: 2
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 30  # 60 seconds total
    
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    
    env:
    - name: NODE_ENV
      value: "production"
    - name: AGENTS_DIR
      value: "/app/agents"
    - name: SHARED_INSTRUCTIONS_DIR
      value: "/app/shared-instructions"





