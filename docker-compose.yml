version: '3.8'

services:
  agency-agents-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: bluemountain.azurecr.io/agency-agents-mcp:${TAG:-latest}
    container_name: agency-agents-mcp
    environment:
      - NODE_ENV=production
      - TZ=Europe/London
      - HTTP_PORT=3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    stdin_open: true
    tty: true




